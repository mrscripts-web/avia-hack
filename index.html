<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AFRICA_HACKS | Neural Gateway</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;700;800&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #030303;
            --card-bg: rgba(15, 15, 15, 0.7);
            --crash-red: #ff0033;
            --apple-gold: #ffcc00;
            --text-dim: #888;
        }

        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            background: var(--bg-dark);
            font-family: 'Inter', sans-serif;
            color: white;
            overflow: hidden;
        }

        /* Animated Background Particles */
        #bg-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; pointer-events: none;
        }

        /* CRT Scanline Overlay */
        body::after {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.15) 0px, rgba(0,0,0,0.15) 1px, transparent 1px, transparent 3px);
            pointer-events: none; z-index: 100;
        }

        .main-wrapper {
            position: relative; z-index: 10;
            height: 100vh; width: 100%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 20px;
        }

        /* Header Logo Section */
        header {
            text-align: center; margin-bottom: 50px;
        }
        .main-logo {
            height: 80px; margin-bottom: 15px;
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.2));
            animation: float 4s infinite ease-in-out;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        
        .brand-name {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 900; font-size: 1.8rem; letter-spacing: 5px;
        }
        .brand-name span { color: var(--crash-red); text-shadow: 0 0 15px var(--crash-red); }

        /* Portal Grid */
        .portal-grid {
            display: grid; grid-template-columns: repeat(2, 1fr);
            gap: 30px; width: 100%; max-width: 900px;
        }

        .engine-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 40px;
            text-decoration: none;
            color: white;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; flex-direction: column; align-items: center;
            position: relative; overflow: hidden;
        }

        .engine-card:hover {
            transform: translateY(-10px) scale(1.02);
            background: rgba(25, 25, 25, 0.8);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .engine-icon {
            font-size: 50px; margin-bottom: 20px;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.2));
        }

        .engine-name {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px; font-weight: 800; letter-spacing: 4px;
            margin-bottom: 10px; color: var(--text-dim);
        }

        .engine-title {
            font-size: 24px; font-weight: 900; margin-bottom: 25px;
            text-transform: uppercase; letter-spacing: 1px;
        }

        .btn-enter {
            padding: 14px 35px; border-radius: 12px;
            font-family: 'JetBrains Mono', monospace; font-weight: 800; font-size: 12px;
            transition: 0.3s; width: 100%; text-align: center;
        }

        /* Crash Card Styles */
        .card-crash:hover { box-shadow: 0 20px 50px rgba(255, 0, 51, 0.15); border-color: var(--crash-red); }
        .card-crash .btn-enter { background: var(--crash-red); color: white; box-shadow: 0 5px 15px rgba(255, 0, 51, 0.3); }
        .card-crash:hover .engine-title { color: var(--crash-red); }

        /* Apple Card Styles */
        .card-apple:hover { box-shadow: 0 20px 50px rgba(255, 204, 0, 0.15); border-color: var(--apple-gold); }
        .card-apple .btn-enter { background: var(--apple-gold); color: black; box-shadow: 0 5px 15px rgba(255, 204, 0, 0.3); }
        .card-apple:hover .engine-title { color: var(--apple-gold); }

        /* Footer Status */
        footer {
            position: absolute; bottom: 30px; width: 100%;
            text-align: center; font-family: 'JetBrains Mono', monospace;
            font-size: 9px; color: #333; letter-spacing: 3px;
        }

        @media (max-width: 768px) {
            .portal-grid { grid-template-columns: 1fr; gap: 15px; }
            .engine-card { padding: 30px; }
            .main-logo { height: 60px; }
        }
    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="main-wrapper">
    <header>
        <img src="logos/Africa.png" alt="AFRICA_HACKS" class="main-logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2111/2111646.png'">
        <div class="brand-name">AFRICA<span>_HACKS</span></div>
        <div style="font-size: 10px; color: #555; font-family: 'JetBrains Mono'; margin-top: 10px;">NEURAL_GATEWAY_V4.01</div>
    </header>

    <div class="portal-grid">
        <a href="crash.html" class="engine-card card-crash">
            <div class="engine-icon">🚀</div>
            <div class="engine-name">CORE_ENGINE_01</div>
            <div class="engine-title">Crash Predictor</div>
            <div class="btn-enter">INITIALIZE SYNC</div>
        </a>

        <a href="appleoffortune.html" class="engine-card card-apple">
            <div class="engine-icon">🍎</div>
            <div class="engine-name">CORE_ENGINE_02</div>
            <div class="engine-title">Apple Fortune</div>
            <div class="btn-enter">INITIALIZE SYNC</div>
        </a>
    </div>

    <footer>
        SECURED BY AFRICA HACKS QUANTUM ENCRYPTION // 2026
    </footer>
</div>

<script>
    // Simple Particle Background
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function init() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        particles = [];
        for(let i=0; i<60; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                v: 0.2 + Math.random() * 0.5,
                size: 1 + Math.random() * 2
            });
        }
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
        particles.forEach(p => {
            p.y -= p.v;
            if(p.y < 0) p.y = canvas.height;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fill();
        });
        requestAnimationFrame(animate);
    }

    window.addEventListener('resize', init);
    init();
    animate();
</script>

</body>
</html>
