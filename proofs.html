<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AFRICA HACKS | Neural Feed v10.0</title>
    <style>
        :root { --accent: #ff0033; --bg: #000; --terminal: #070707; --green: #00ff00; }
        * { box-sizing: border-box; font-family: 'JetBrains Mono', monospace; }

        body { 
            background: var(--bg); color: #fff; margin: 0; padding: 0; 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* --- CRT EFFECT --- */
        body::after {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 20; background-size: 100% 2px, 3px 100%; pointer-events: none;
        }

        .top-bar {
            padding: 15px; border-bottom: 1px solid #222; background: #000;
            display: flex; justify-content: space-between; align-items: center;
            text-decoration: none; z-index: 30;
        }

        .terminal-window {
            flex: 1; background: var(--terminal); position: relative; overflow: hidden;
            display: flex; flex-direction: column;
        }

        .term-header {
            background: #111; padding: 10px 15px; font-size: 8px; color: #555;
            display: grid; grid-template-columns: 1.2fr 1fr 1fr; border-bottom: 1px solid #222;
        }

        #log-container {
            flex: 1; overflow-y: hidden; display: flex; flex-direction: column-reverse; /* Newest on bottom */
            padding: 0 15px;
        }

        .tx-row {
            display: grid; grid-template-columns: 1.2fr 1fr 1fr; padding: 12px 0;
            border-bottom: 1px solid #111; font-size: 10px; animation: slideIn 0.4s ease-out;
        }

        .tx-country { color: #444; font-size: 8px; font-weight: bold; }
        .tx-user { color: #888; }
        .tx-amt { color: var(--green); font-weight: bold; text-align: right; text-shadow: 0 0 5px var(--green); }

        .system-ticker {
            height: 30px; background: #900; color: #fff; font-size: 8px;
            display: flex; align-items: center; overflow: hidden; font-weight: bold;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <a href="index.html" class="top-bar">
        <span style="color: var(--accent); font-weight: bold; letter-spacing: 2px;">AFRICA_HACKS</span>
        <span style="color: var(--green); font-size: 8px;">● UPLINK_ACTIVE</span>
    </a>

    <div class="terminal-window">
        <div class="term-header">
            <span>LOCATION</span>
            <span>NODE_ID</span>
            <span style="text-align:right;">AMOUNT</span>
        </div>
        <div id="log-container">
            </div>
    </div>

    <div class="system-ticker">
        <marquee scrollamount="10">ENCRYPTING DATA_PACKETS... BYPASSING SPORTY_GATEWAY... SERVER_STABLE... INJECTING_0x442... NEW_PAYOUT_DETECTED...</marquee>
    </div>

    <script>
        const container = document.getElementById('log-container');
        const countries = [
            {n: 'NIGERIA', c: '₦'}, {n: 'GHANA', c: '₵'}, {n: 'KENYA', c: 'Ksh'}, 
            {n: 'S.AFRICA', c: 'R'}, {n: 'UGANDA', c: 'USh'}, {n: 'CAMEROON', c: 'CFA'},
            {n: 'SENEGAL', c: 'CFA'}, {n: 'TANZANIA', c: 'TSh'}, {n: 'ZAMBIA', c: 'ZK'}
        ];
        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";

        function generateRow() {
            const country = countries[Math.floor(Math.random() * countries.length)];
            const user = chars.charAt(Math.floor(Math.random() * chars.length)) + ".." + Math.floor(Math.random() * 99);
            
            // Randomly pick a "realistic" amount based on currency
            let amount;
            if(country.c === '₦') amount = (Math.floor(Math.random() * 80) + 5) * 1000;
            else if(country.c === '₵') amount = (Math.floor(Math.random() * 500) + 50);
            else amount = (Math.floor(Math.random() * 100) + 10) * 10;

            const row = document.createElement('div');
            row.className = 'tx-row';
            row.innerHTML = `
                <span class="tx-country">[${country.n}]</span>
                <span class="tx-user">${user}</span>
                <span class="tx-amt">${country.c}${amount.toLocaleString()}</span>
            `;

            container.prepend(row);

            // Keep the DOM clean: Remove oldest rows if there are more than 20
            if (container.children.length > 25) {
                container.removeChild(container.lastChild);
            }
        }

        // Start generating!
        setInterval(generateRow, 2200); // New name every 2.2 seconds
        
        // Initial batch so the screen isn't empty
        for(let i=0; i<12; i++) { generateRow(); }
    </script>
</body>
</html>
